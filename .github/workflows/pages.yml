name: Deploy website to GitHub Pages

# Publishes the /website folder. GitHub Pages' "deploy from a branch" mode only
# allows the repo root or /docs as the source; using the "GitHub Actions" source
# (Settings → Pages → Build and deployment → Source: GitHub Actions) lets us
# publish any folder — here, website/ — without moving files or touching /docs.

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Enable Pages (build type = GitHub Actions) via the API on first run,
          # so no manual Settings → Pages toggle is required.
          enablement: true

      - name: Upload website/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
